name: blastcontain-test

services:
  # BlastContain server (Charter + Ledger)
  blastcontain-server:
    build:
      context: ../..
      dockerfile: tests/containers/Containerfile.server
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - BLASTCONTAIN_ENV=test
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Test agent (registered, behaves correctly)
  agent:
    build:
      context: ../..
      dockerfile: tests/containers/Containerfile.agent
    environment:
      - BLASTCONTAIN_URL=http://blastcontain-server:8080
      - AGENT_ID=test-agent
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    networks:
      - internal
    depends_on:
      blastcontain-server:
        condition: service_healthy

  # Multi-agent delegation scenario
  multiagent-scenario:
    build:
      context: ../..
      dockerfile: tests/containers/Containerfile.multiagent
    environment:
      - BLASTCONTAIN_URL=http://blastcontain-server:8080
    networks:
      - internal
    depends_on:
      blastcontain-server:
        condition: service_healthy

networks:
  internal:
    internal: true
