openapi: "3.0.3"
info:
  title: Safe Test API
  version: "1.0.0"
  description: Fixture spec — passes API-01 and API-02

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

paths:
  /tickets:
    get:
      summary: List support tickets
      operationId: listTickets
      security:
        - bearerAuth: []
      responses:
        "200": { description: OK }

  /tickets/{id}:
    get:
      summary: Get a specific ticket
      operationId: getTicket
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /status:
    get:
      summary: Health status
      operationId: getStatus
      security:
        - bearerAuth: []
      responses:
        "200": { description: OK }
