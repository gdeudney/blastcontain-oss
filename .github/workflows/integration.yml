name: Integration

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "verify/**"
      - "drill/**"
      - ".github/workflows/integration.yml"
  pull_request:
    branches: [main]
    paths:
      - "core/**"
      - "verify/**"
      - "drill/**"
      - ".github/workflows/integration.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt JS actions into the Node 24 runtime — Node 20 is deprecated (forced 2026-06-02,
# removed from runners 2026-09-16). Version-agnostic; avoids guessing action majors.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify-container:
    name: Verify hardened-container integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Build verify image (context = repo root)
        # Build with podman: the scenario tests invoke podman, which has its own
        # image store and can't see docker-built images (it would try to pull).
        run: podman build -t blastcontain-verify:test -f verify/Containerfile .

      - name: Start MCP + API test services (podman)
        # Start the services under podman on a podman network. The scenario
        # tests run `podman run --network blastcontain-testnet`, and podman
        # cannot see a docker-compose-created network — that split made the 3
        # TestNetworkFail probes fail with "network not found". Container names
        # match the hostnames the tests probe (e.g. ENV-02 -> mcp-server:8080).
        working-directory: verify/tests/integration
        run: |
          podman network create blastcontain-testnet
          podman build -t blastcontain-mcp-test ./mcp-server
          podman build -t blastcontain-api-test ./api-server
          podman run -d --name mcp-server --network blastcontain-testnet -p 18080:8080 blastcontain-mcp-test
          podman run -d --name api-server --network blastcontain-testnet -p 18081:8081 blastcontain-api-test
          timeout 90 bash -c 'until curl -sf http://localhost:18080/health; do sleep 2; done'
          timeout 90 bash -c 'until curl -sf http://localhost:18081/health; do sleep 2; done'

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test deps
        working-directory: verify/tests/integration
        run: pip install -r requirements.txt

      - name: FAIL + PASS scenario tests
        working-directory: verify/tests/integration
        env:
          SKIP_COMPOSE: "1"
          # Use the image built above; conftest otherwise defaults to :0.1.0, which
          # isn't built, so podman tries to pull it and every check fails (exit 125).
          VERIFY_IMAGE: blastcontain-verify:test
        run: |
          python -m pytest test_fail.py -v --timeout=120 --tb=short
          python -m pytest test_pass.py -v --timeout=120 --tb=short

      - name: Upload service logs on failure
        if: failure()
        run: |
          podman logs mcp-server  > /tmp/service-logs.txt 2>&1 || true
          podman logs api-server >> /tmp/service-logs.txt 2>&1 || true

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: verify-service-logs
          path: /tmp/service-logs.txt

      - name: Stop services
        if: always()
        run: |
          podman rm -f mcp-server api-server || true
          podman network rm blastcontain-testnet || true

  drill-podman:
    name: Drill cage containment (podman)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e "./core"
      - run: pip install -e "./drill[dev]"
      - name: Podman cage-containment tests
        working-directory: drill
        run: pytest tests/integration -m podman -v
